<aside class="sidebar" [style.width]="layout.sidebarWidth()" [class.collapsed]="!layout.isSidebarOpen()" role="complementary">
  <div class="sidebar-header">
    <div class="logo-container">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
        </svg>
      </div>
      <div class="logo-text">
        <span class="main-text">Curator</span>
        <span class="sub-text">Health</span>
      </div>
    </div>
  </div>

  <nav class="nav-links">
    @for (item of menuItems; track item.label) {
    <a [routerLink]="item.path" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-item"
      [title]="item.label">
      <span class="icon">
        @switch (item.label) {
        @case ('Panel de Control') {
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <rect x="3" y="3" width="7" height="7" rx="1" />
          <rect x="14" y="3" width="7" height="7" rx="1" />
          <rect x="14" y="14" width="7" height="7" rx="1" />
          <rect x="3" y="14" width="7" height="7" rx="1" />
        </svg>
        }
        @case ('Comprobantes') {
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="5" width="20" height="14" rx="2" />
          <line x1="2" y1="10" x2="22" y2="10" />
        </svg>
        }
        @case ('Pacientes') {
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
          <circle cx="9" cy="7" r="4" />
          <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
          <path d="M16 3.13a4 4 0 0 1 0 7.75" />
        </svg>
        }
        @case ('Calendario') {
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
          <line x1="16" y1="2" x2="16" y2="6" />
          <line x1="8" y1="2" x2="8" y2="6" />
          <line x1="3" y1="10" x2="21" y2="10" />
        </svg>
        }
        @case ('Servicios') {
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
          <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
          <line x1="8" y1="11" x2="8" y2="11.01"></line>
          <line x1="8" y1="16" x2="8" y2="16.01"></line>
          <line x1="12" y1="11" x2="16" y2="11"></line>
          <line x1="12" y1="16" x2="16" y2="16"></line>
        </svg>
        }
        }
      </span>
      <span class="label">{{ item.label }}</span>
    </a>
    }
  </nav>

  <div class="sidebar-footer">
    <button class="new-btn" title="Nueva Cita" (click)="layout.toggleAppointmentDrawer()">
      <span class="icon">+</span>
      <span class="label">Nueva Cita</span>
    </button>
    <button class="logout-btn" title="Cerrar Sesión" routerLink="/login">
      <span class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
      </span>
      <span class="label">Cerrar Sesión</span>
    </button>
  </div>
</aside>
