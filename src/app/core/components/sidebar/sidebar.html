<aside class="sidebar" [style.width]="layout.sidebarWidth()" [class.collapsed]="!layout.isSidebarOpen()" role="complementary">
  <div class="sidebar-header">
    <div class="logo-container">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
        </svg>
      </div>
      <div class="logo-text">
        <span class="main-text">Curator</span>
        <span class="sub-text">Health</span>
      </div>
    </div>
  </div>

    <nav class="nav-links">
      @for (item of filteredMenuItems; track item.path) {
      <a [routerLink]="item.path" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-item"
        [title]="item.label" (click)="layout.closeSidebar()">
        <span class="icon">
          <i [class]="item.icon"></i>
        </span>
        <span class="label">{{ item.label }}</span>
      </a>
      }
    </nav>

  <div class="sidebar-footer">
    <button class="new-btn" title="Nueva Cita" (click)="layout.toggleAppointmentDrawer()">
      <span class="icon">+</span>
      <span class="label">Nueva Cita</span>
    </button>
    <button class="logout-btn" title="Cerrar Sesión" (click)="logout()">
      <span class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
      </span>
      <span class="label">Cerrar Sesión</span>
    </button>
  </div>
</aside>
