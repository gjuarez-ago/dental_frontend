<div class="drawer-backdrop" [class.open]="isOpen" (click)="close()"></div>

<div class="config-drawer" [class.open]="isOpen">
  <header class="drawer-header">
    <div class="header-content">
      <div class="title-group">
        <i class="ph ph-gear-six ph-duotone"></i>
        <h2>Ajustes Operativos</h2>
      </div>
      <p>Configura tu identidad profesional y horarios de atención.</p>
    </div>
    <button class="close-btn" (click)="close()">
      <i class="ph ph-x"></i>
    </button>
  </header>

  <div class="drawer-body">
    <!-- Pantalla de Carga -->
    <div *ngIf="isLoading()" class="loading-overlay">
      <i class="ph ph-circle-notch animate-spin"></i>
      <p>Consultando configuración...</p>
    </div>

    <form *ngIf="!isLoading()" [formGroup]="configForm" class="premium-form">
      
      <!-- IDENTIDAD -->
      <section class="form-section">
        <label class="section-label">Identidad Profesional</label>
        <div class="form-grid">
          <div class="form-group full-width">
            <label>Nombre Completo / Clínica</label>
            <input type="text" formControlName="professionalName" placeholder="Ej: Dra. Elena Ruiz">
          </div>
          <div class="form-group full-width">
            <label>Cédula Profesional</label>
            <input type="text" formControlName="professionalCedula" placeholder="Ej: 12345678">
          </div>
          <div class="form-group full-width">
            <label>Límite de Cambio (Horas antes)</label>
            <input type="number" formControlName="cancellationWindow" placeholder="24">
          </div>
        </div>
      </section>

      <!-- HORARIOS -->
      <section class="form-section">
        <label class="section-label">Horarios Laborales por Día</label>
        <div class="schedule-list" formArrayName="weeklySchedule">
          @for (dayGroup of scheduleArray.controls; track $index) {
            <div class="day-row" [formGroupName]="$index">
              <div class="day-info">
                <label class="toggle-switch">
                  <input type="checkbox" formControlName="enabled">
                  <span class="slider"></span>
                </label>
                <span class="day-name">{{ dayGroup.get('day')?.value }}</span>
              </div>

              @if (dayGroup.get('enabled')?.value) {
                <div class="time-controls animate-fade-in">
                  <div class="time-field">
                    <input type="time" formControlName="startTime">
                  </div>
                  <span class="separator">-</span>
                  <div class="time-field">
                    <input type="time" formControlName="endTime">
                  </div>
                </div>
              } @else {
                <span class="descanso-label">Día de Descanso</span>
              }
            </div>
          }
        </div>
      </section>
    </form>
  </div>

  <footer class="drawer-footer">
    <button class="btn-secondary" (click)="close()" [disabled]="isSaving()">Cancelar</button>
    <button class="btn-primary" (click)="save()" [disabled]="configForm.invalid || isSaving() || isLoading()">
      <i class="ph" [class.ph-floppy-disk]="!isSaving()" [class.ph-circle-notch]="isSaving()" [class.animate-spin]="isSaving()"></i>
      {{ isSaving() ? 'Guardando...' : 'Guardar Ajustes' }}
    </button>
  </footer>
</div>
