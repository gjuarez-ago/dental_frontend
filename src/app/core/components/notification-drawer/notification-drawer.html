<div class="drawer-backdrop" [class.open]="layout.isNotificationOpen()" (click)="close()"></div>

<div class="notification-drawer" [class.open]="layout.isNotificationOpen()">
  <header class="drawer-header">
    <div class="header-content">
      <div class="title-group">
        <i class="ph-duotone ph-bell-ringing"></i>
        <h2>Notificaciones</h2>
      </div>
      <p>Mantente al tanto de la actividad de tu clínica.</p>
    </div>
    <button class="close-btn" (click)="close()">
      <i class="ph ph-x"></i>
    </button>
  </header>

  <div class="drawer-body">
    <div class="notifications-list">
      @for (notify of notifications; track notify.id) {
        <div class="notification-item" [class.unread]="!notify.read">
          <div class="item-icon" [attr.data-type]="notify.type">
            <i class="ph" [ngClass]="getIconForType(notify.type)"></i>
          </div>
          <div class="item-content">
            <div class="item-header">
              <span class="item-title">{{ notify.title }}</span>
              <span class="item-time">{{ notify.time }}</span>
            </div>
            <p class="item-message">{{ notify.message }}</p>
          </div>
          @if (!notify.read) {
            <div class="unread-dot"></div>
          }
        </div>
      }
    </div>

    @if (notifications.length === 0) {
      <div class="empty-state">
        <i class="ph ph-bell-simple-slash"></i>
        <p>No tienes notificaciones pendientes.</p>
      </div>
    }
  </div>

  <footer class="drawer-footer">
    <button class="btn-clear-all">Marcar todas como leídas</button>
  </footer>
</div>
