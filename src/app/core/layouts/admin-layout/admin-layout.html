<div class="admin-shell">
  <!-- Sidebar -->
  @if (layout.isSidebarOpen()) {
  <div class="sidebar-backdrop" (click)="layout.toggleSidebar()"></div>
  }

  <app-sidebar></app-sidebar>

  <!-- Content Wrapper -->
  <div class="content-wrapper" [style.marginLeft]="layout.sidebarWidth()">
    <!-- Navbar -->
    <app-navbar></app-navbar>

    <!-- Content Area -->
    <main class="main-container" role="main">
      <div class="view-content">
        <router-outlet></router-outlet>
      </div>
    </main>

    <!-- Footer -->
    <footer class="app-footer">
      <p>&copy; 2026 Dental Sonrisana. V 1.0.0</p>
    </footer>
  </div>

  <app-appointment-drawer [isOpen]="layout.isAppointmentDrawerOpen()" (close)="layout.closeAppointmentDrawer()"
    (saved)="onAppointmentSaved($event)">
  </app-appointment-drawer>

  <app-config-drawer [isOpen]="layout.isConfigOpen()"></app-config-drawer>

  <app-confirmation-drawer></app-confirmation-drawer>
  <app-rejection-drawer></app-rejection-drawer>
  <app-cancellation-drawer></app-cancellation-drawer>

  <ngx-spinner bdColor="rgba(255,255,255,0.7)" size="medium" color="#1A2B4C" type="ball-scale-multiple"
    [fullScreen]="true">
    <p style="color: #1A2B4C; font-weight: 700; margin-top: 20px; font-family: 'Outfit', sans-serif;">Cargando
      clínica...</p>
  </ngx-spinner>
</div>
