spring.application.name=crm
spring.jackson.deserialization.adjust-dates-to-context-time-zone=false
spring.jackson.serialization.write-dates-as-timestamps=false

# ===============================
# JWT CONFIG
# ===============================
jwt.secret=${JWT_SECRET:Y2xhdmVfcG9jaGlfbW92aWxfc2VjcmV0XzI1Nl9iaXRzX3NlZ3VyYQ==}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ===============================
# DATABASE
# ===============================
# URL de conexión a la base de datos PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Servidor
server.port=${PORT:8080}

# ===============================
# INTEGRACIONES (Opcionales)
# ===============================
whatsapp.verify-token=${WHATSAPP_VERIFY_TOKEN:default}
whatsapp.access-token=${WHATSAPP_ACCESS_TOKEN:default}
whatsapp.phone-number-id=${WHATSAPP_PHONE_NUMBER_ID:default}
whatsapp.api-url=${WHATSAPP_API_URL:https://graph.facebook.com/v22.0}

openai.api.key=${OPENAI_API_KEY:default}
openai.model=${OPENAI_MODEL:gpt-4o-mini}

cloudflare.r2.endpoint=${R2_ENDPOINT:default}
cloudflare.r2.access-key-id=${R2_ACCESS_KEY:default}
cloudflare.r2.secret-access-key=${R2_SECRET_KEY:default}
cloudflare.r2.bucket-name=${R2_BUCKET:meyi-imagenes}
cloudflare.r2.public-url=${R2_PUBLIC_URL:default}

# Email
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:default}
spring.mail.password=${MAIL_PASSWORD:default}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true